name: Main Taski workflow

on:
  push:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      # Копируем код проекта
      - name: Check out code
        uses: actions/checkout@v3

      # Устанавливаем Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      # Обновляем pip, setuptools и wheel через python -m ensurepip
      - name: Install dependencies
        run: |
          python -m ensurepip --upgrade
          python -m pip install --upgrade pip setuptools wheel
          pip install flake8==6.0.0 flake8-isort==6.0.0
          pip install -r ./backend/requirements.txt

      # Устанавливаем flake8 и flake8-isort
      - name: Install flake8 and plugins
        run: pip install flake8 flake8-isort

      - name: Test with flake8 and django tests
        # Команд стало больше одной; ставим символ | и пишем команды построчно
        run: |
          python -m flake8 backend/
          cd backend/
          python manage.py test
